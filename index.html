<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serenity</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="reset.css">
	<link rel="stylesheet" href="style.css">
	<script src="script.js" defer=""></script>
  <style type="text/css" media="print">
        @media print {
            .no-print {
                display: none !important;
            }
        }
    </style></head>
  <body>
    <!-- Header Section -->
    <header>
      <h1>Serenity</h1>
    </header>


    <!-- Main Content Section-->
    <main class="container">
		   <!-- Navigation Section -->
	<nav>
		<button class="theme-btn" id="theme-forest">Forest</button>
		<button class="theme-btn" id="theme-Ocean">Ocean</button>
		<button class="theme-btn" id="theme-Night">Night</button>
		<button class="theme-btn" id="theme-Rain">Rain</button>
	</nav>
      <!-- Media Player Section -->
	   <audio id="custom-audio-player">
			<source src="https://thelongesthumstore.sgp1.cdn.digitaloceanspaces.com/IM-2250/erokia_ambient-wave-56-msfxp7-78.mp3" type="audio/mp3">
		</audio>

		<div class="media-player">
			<div class="player-left">
				<img src="Image1.jpeg" alt="Image1.jpeg" class="album-cover">
			</div>
			<div class="player-right">
				<h2 id="theme-title">Select a theme</h2>
				<div class="custom-controls">
					<div class="progress-bar">
						<span id="progress-bar-fill" style="width: 0%;"></span>
					</div>
					<button id="play-pause-btn" onclick="togglePlayPause()">
						<img id="play-pause-img" src="play--v1.png" alt="Play Button" width="24" height="24">
					</button>
				</div>
			</div>
      </div>
      </section>
    </main>

    <!-- Footer Section -->
    <footer>
      <p>© d.</p>
      <a href="https://icons8.com/icon/59862/play">Play</a> icon by
      <a href="https://icons8.com/">Icons8</a>
      <a href="https://icons8.com/icon/61012/pause">Pause</a> icon by
      <a href="https://icons8.com/">Icons8</a>
    </footer>
